<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 02 - CSS Architecture</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            width:500px;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 10px rgba(0,0,0,.2);
            text-align:center;
        }

        h1{
            margin-bottom:25px;
            color:#2c3e50;
        }

        a{
            display:block;
            margin:15px 0;
            padding:12px;
            background:#3498db;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        a:hover{
            background:#2c3e50;
        }

    </style>

</head>
<body>

<div class="card">
