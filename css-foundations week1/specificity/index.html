<!DOCTYPE html>
<html>
<head>
<style>

:root{
    --bg-color: orange;
    --text-color: white;
}

/* Element Selector */
div{
    background: yellow;
}

/* Class Selector */
.box{
    background: green;
}

/* ID Selector (Highest Specificity) */
#demo{
    background: var(--bg-color);
    color: var(--text-color);
    padding: 20px;
}

</style>
</head>
<body>

<div id="demo" class="box">
    CSS Specificity + Custom Properties
</div>

</body>
</html>
